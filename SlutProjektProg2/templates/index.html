<!DOCTYPE html>
<html lang="en">

<head>
<style>
body{
    margin:0;
    color:white;
    background-color:#222222;
}
.headertext{
    font-size:2em;
    text-align: center;
    font-family:Verdana;
}
header{
    height:100px;
    background-color: #000000;
    display:flex;
    justify-content: center;
    align-items: center;
}
main{
    width:80%;
    margin:auto;
    display:flex;
    flex-direction: column;
    justify-content: center;
    gap:10px;
}

.buttons{
    margin:10px;
    cursor:pointer;
    border: solid black 2px;
    background-color:rgb(70, 70, 68);
    padding:10px;
    color:white;

    
}

</style>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

</head>

<body>
<header>
    <div class = "headertext">
        AGAR.IO
    </div>
</header>
<main>
    
<button id = "matchbtn" class = "buttons">PLAY</button>
</main>

<script>

    const socket = io();
    const button = document.getElementById("matchbtn")
    
    button.addEventListener("click", () => {
        const PlayerID = localStorage.getItem("player_id");
        console.log("Pressed button");
        socket.emit("queue", {player_id:PlayerID});
    });
    socket.on("start_game", (data) =>{
        gameId = data.game_id
        console.log(gameId)
        window.location.href = `/game/${gameId}`;
        console.log("Game Started");
    });

</script>

</body>

</html>
